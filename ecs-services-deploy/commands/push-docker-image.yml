description: Builds a docker image
parameters:
  ecr-repo:
    type: string
    default: ""
  aws-registry:
    type: string
    default: ""
  aws-region:
    type: string
    default: "us-east-2"
  image-version:
    type: string
    default: latest
  latest-tag:
    type: string
    default: "latest"
    description: "Tag that will be pushed if 'image-version' is pushed"
  image-name:
    type: string
    default: ""
steps:
  - run:
      name: Tag/push '<< parameters.image-name >>:<< parameters.image-version >>' and '<< parameters.latest-tag >>'
      command: |
        ECR_REPO="<< parameters.ecr-repo >>"
        VERSION_TAG="<< parameters.image-version >>"
        FULL_VERSION_TAG="${ECR_REPO}:${VERSION_TAG}"
        LATEST_TAG="<< parameters.latest-tag >>"
        FULL_LATEST_TAG="${ECR_REPO}:${LATEST_TAG}"

        aws ecr get-login-password --region << parameters.aws-region >> | docker login --username AWS --password-stdin << parameters.aws-registry >>
        echo " * Checking if image exists "

        if ! aws ecr describe-images --region=<< parameters.aws-region >> --repository-name=<< parameters.image-name >> --image-ids=imageTag=${VERSION_TAG}; then

            echo " * Tagging image...<< parameters.image-name >> to $FULL_VERSION_TAG"
            docker tag << parameters.image-name >> $FULL_VERSION_TAG

            echo " * Pushing image.. $FULL_VERSION_TAG"
            docker push $FULL_VERSION_TAG

            if [ "$VERSION_TAG" != "$LATEST_TAG" ]; then
              echo " * Tagging image...<< parameters.image-name >> to $FULL_LATEST_TAG"
              docker tag << parameters.image-name >> $FULL_LATEST_TAG

              echo " * Pushing image.. $FULL_LATEST_TAG"
              docker push $FULL_LATEST_TAG
            fi
        else
          echo " * Image...<< parameters.image-name >> already tagged, skipping step ..."
        fi
